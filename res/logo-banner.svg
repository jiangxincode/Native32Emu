<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280">
  <defs>
    <!-- Gradient for the main shape -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8553A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C7412D;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for the chip body -->
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for the screen -->
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Centered chip (same as original, centered in canvas) -->
  <g transform="translate(100, 0)">
    <!-- Main chip/IC shape -->
    <rect x="100" y="80" width="200" height="140" rx="10" ry="10" fill="url(#chipGradient)" stroke="#404040" stroke-width="2"/>

    <!-- Chip pins - left side -->
    <rect x="80" y="100" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="80" y="120" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="80" y="140" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="80" y="160" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="80" y="180" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="80" y="200" width="20" height="8" rx="2" fill="#E8553A"/>

    <!-- Chip pins - right side -->
    <rect x="300" y="100" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="300" y="120" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="300" y="140" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="300" y="160" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="300" y="180" width="20" height="8" rx="2" fill="#E8553A"/>
    <rect x="300" y="200" width="20" height="8" rx="2" fill="#E8553A"/>

    <!-- Chip pins - top -->
    <rect x="120" y="60" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="150" y="60" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="180" y="60" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="210" y="60" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="240" y="60" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="270" y="60" width="8" height="20" rx="2" fill="#E8553A"/>

    <!-- Chip pins - bottom -->
    <rect x="120" y="220" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="150" y="220" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="180" y="220" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="210" y="220" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="240" y="220" width="8" height="20" rx="2" fill="#E8553A"/>
    <rect x="270" y="220" width="8" height="20" rx="2" fill="#E8553A"/>

    <!-- Screen area -->
    <rect x="125" y="95" width="150" height="70" rx="5" ry="5" fill="#0A0A0A" stroke="#404040" stroke-width="1"/>

    <!-- Screen content - "Native 32 Emulator" text -->
    <text x="200" y="125" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#4ADE80" text-anchor="middle">Native 32</text>
    <text x="200" y="150" font-family="'Courier New', monospace" font-size="12" fill="#4ADE80" text-anchor="middle">Emulator</text>

    <!-- Cursor blink effect -->
    <rect x="245" y="140" width="5" height="12" fill="#4ADE80" opacity="0.8"/>

    <!-- Scanline effect -->
    <g opacity="0.1">
      <line x1="125" y1="95" x2="275" y2="95" stroke="white" stroke-width="1"/>
      <line x1="125" y1="100" x2="275" y2="100" stroke="white" stroke-width="1"/>
      <line x1="125" y1="105" x2="275" y2="105" stroke="white" stroke-width="1"/>
      <line x1="125" y1="110" x2="275" y2="110" stroke="white" stroke-width="1"/>
      <line x1="125" y1="115" x2="275" y2="115" stroke="white" stroke-width="1"/>
      <line x1="125" y1="120" x2="275" y2="120" stroke="white" stroke-width="1"/>
      <line x1="125" y1="125" x2="275" y2="125" stroke="white" stroke-width="1"/>
      <line x1="125" y1="130" x2="275" y2="130" stroke="white" stroke-width="1"/>
      <line x1="125" y1="135" x2="275" y2="135" stroke="white" stroke-width="1"/>
      <line x1="125" y1="140" x2="275" y2="140" stroke="white" stroke-width="1"/>
      <line x1="125" y1="145" x2="275" y2="145" stroke="white" stroke-width="1"/>
      <line x1="125" y1="150" x2="275" y2="150" stroke="white" stroke-width="1"/>
      <line x1="125" y1="155" x2="275" y2="155" stroke="white" stroke-width="1"/>
      <line x1="125" y1="160" x2="275" y2="160" stroke="white" stroke-width="1"/>
      <line x1="125" y1="165" x2="275" y2="165" stroke="white" stroke-width="1"/>
    </g>

    <!-- Screen glow effect -->
    <rect x="125" y="95" width="150" height="70" rx="5" ry="5" fill="none" stroke="#4ADE80" stroke-width="1" opacity="0.5"/>

    <!-- D-pad (decorative) - positioned between screen and bottom pins -->
    <rect x="140" y="190" width="25" height="8" rx="2" fill="#3B82F6"/>
    <rect x="148" y="182" width="8" height="25" rx="2" fill="#3B82F6"/>

    <!-- Controller buttons (decorative) - positioned between screen and bottom pins -->
    <circle cx="225" cy="190" r="5" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="242" cy="190" r="5" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="233" cy="205" r="5" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="250" cy="205" r="5" fill="none" stroke="#3B82F6" stroke-width="2"/>

    <!-- Decorative circuit lines -->
    <path d="M 120 90 L 120 80 L 140 80" fill="none" stroke="#E8553A" stroke-width="1.5" opacity="0.6"/>
    <path d="M 280 90 L 280 80 L 260 80" fill="none" stroke="#E8553A" stroke-width="1.5" opacity="0.6"/>
    <path d="M 120 210 L 120 220 L 140 220" fill="none" stroke="#E8553A" stroke-width="1.5" opacity="0.6"/>
    <path d="M 280 210 L 280 220 L 260 220" fill="none" stroke="#E8553A" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Left decorative circuit lines -->
  <g opacity="0.5">
    <path d="M 130 80 L 130 110 L 178 110" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M 130 120 L 130 150 L 178 150" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M 130 160 L 130 190 L 178 190" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M 130 200 L 130 230 L 178 230" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <circle cx="130" cy="80" r="3" fill="#8B5CF6"/>
    <circle cx="130" cy="120" r="3" fill="#8B5CF6"/>
    <circle cx="130" cy="160" r="3" fill="#8B5CF6"/>
    <circle cx="130" cy="200" r="3" fill="#8B5CF6"/>
  </g>

  <!-- Right decorative circuit lines -->
  <g opacity="0.5">
    <path d="M 470 80 L 470 110 L 422 110" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M 470 120 L 470 150 L 422 150" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M 470 160 L 470 190 L 422 190" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M 470 200 L 470 230 L 422 230" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <circle cx="470" cy="80" r="3" fill="#8B5CF6"/>
    <circle cx="470" cy="120" r="3" fill="#8B5CF6"/>
    <circle cx="470" cy="160" r="3" fill="#8B5CF6"/>
    <circle cx="470" cy="200" r="3" fill="#8B5CF6"/>
  </g>

  <!-- Bottom decorative line -->
  <line x1="180" y1="260" x2="420" y2="260" stroke="#8B5CF6" stroke-width="2" opacity="0.4"/>
</svg>
