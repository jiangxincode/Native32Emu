name: Nightly Build

# Build native binaries every night and publish them as a rolling
# `nightly-build` GitHub prerelease, so users can always grab the
# latest from master without waiting for a tagged version.
#
# Triggers:
#   - Cron at 20:00 UTC (04:00 Beijing) every day.
#   - Manual workflow_dispatch.
#   - Every push to master (so the rolling release always reflects HEAD).

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: native32-emu-linux-x86_64
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: native32-emu-linux-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: native32-emu-macos-x86_64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: native32-emu-macos-aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: native32-emu-windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Compute version metadata
        id: ver
        shell: bash
        run: |
          echo "DATE=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "DATETIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: nightly-${{ matrix.target }}

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxkbcommon-dev
        timeout-minutes: 10

      - name: Build standalone
        run: cargo build -p native32emu --release --target ${{ matrix.target }}

      - name: Build libretro core
        run: cargo build -p native32emu-libretro --release --target ${{ matrix.target }}

      - name: Stage libretro core
        shell: bash
        run: |
          out="libretro/${{ matrix.artifact }}"
          mkdir -p "$out"
          rel="target/${{ matrix.target }}/release"
          # Cargo names the cdylib after its lib target (native32emu); copy it
          # to the native32emu_libretro.<ext> name RetroArch expects.
          for f in "native32emu.dll:native32emu_libretro.dll" \
                   "libnative32emu.so:native32emu_libretro.so" \
                   "libnative32emu.dylib:native32emu_libretro.dylib"; do
            src="${f%%:*}"; dst="${f##*:}"
            if [ -f "$rel/$src" ]; then
              cp "$rel/$src" "$out/$dst"
              break
            fi
          done
          cp crates/native32emu-libretro/native32emu_libretro.info "$out/native32emu_libretro.info"
          ls -la "$out"

      - name: Package libretro (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd libretro
          tar czf ../${{ matrix.artifact }}-libretro.tar.gz ${{ matrix.artifact }}
          cd ..

      - name: Package libretro (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd libretro
          7z a ../${{ matrix.artifact }}-libretro.zip ${{ matrix.artifact }}
          cd ..

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz native32-emu
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }}.zip native32-emu.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.*
            ${{ matrix.artifact }}-libretro.*
          retention-days: 7

  build-android:
    name: Build libretro (Android)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: nightly-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build libretro core (all ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 \
            --platform 21 \
            build -p native32emu-libretro --release

      - name: Stage libretro core (Android)
        shell: bash
        run: |
          # RetroArch on Android loads cores named <corename>_libretro_android.so,
          # one per ABI directory (matching RetroArch's cores/<abi>/ layout).
          declare -A ABI_TRIPLE=(
            [arm64-v8a]=aarch64-linux-android
            [armeabi-v7a]=armv7-linux-androideabi
            [x86]=i686-linux-android
            [x86_64]=x86_64-linux-android
          )
          for abi in "${!ABI_TRIPLE[@]}"; do
            triple="${ABI_TRIPLE[$abi]}"
            out="libretro/native32-emu-android/$abi"
            mkdir -p "$out"
            cp "target/$triple/release/libnative32emu.so" \
               "$out/native32emu_libretro_android.so"
          done
          cp crates/native32emu-libretro/native32emu_libretro.info \
             libretro/native32-emu-android/native32emu_libretro.info
          ls -laR libretro/native32-emu-android

      - name: Package libretro (Android)
        shell: bash
        run: |
          cd libretro
          tar czf ../native32-emu-android-libretro.tar.gz native32-emu-android
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: native32-emu-android
          path: native32-emu-android-libretro.tar.gz
          retention-days: 7

  build-ios:
    name: Build libretro (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: nightly-ios

      - name: Build libretro core (arm64 for real devices)
        run: |
          cargo build -p native32emu-libretro --release --target aarch64-apple-ios

      - name: Build libretro core (x86_64 for real devices)
        run: |
          cargo build -p native32emu-libretro --release --target x86_64-apple-ios

      - name: Build libretro core (arm64 for simulator)
        run: |
          cargo build -p native32emu-libretro --release --target aarch64-apple-ios-sim

      - name: Create universal library and stage
        shell: bash
        run: |
          out="libretro/native32-emu-ios"
          mkdir -p "$out/simulator"

          # Create universal library for real devices (arm64 + x86_64)
          lipo -create \
            target/aarch64-apple-ios/release/libnative32emu.dylib \
            target/x86_64-apple-ios/release/libnative32emu.dylib \
            -output "$out/native32emu_libretro_ios.dylib"

          # Copy arm64 simulator library
          cp target/aarch64-apple-ios-sim/release/libnative32emu.dylib \
             "$out/simulator/native32emu_libretro_ios.dylib"

          # Copy info file
          cp crates/native32emu-libretro/native32emu_libretro.info "$out/"
          ls -laR "$out"

      - name: Package libretro (iOS)
        shell: bash
        run: |
          cd libretro
          tar czf ../native32-emu-ios-libretro.tar.gz native32-emu-ios
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: native32-emu-ios
          path: native32-emu-ios-libretro.tar.gz
          retention-days: 7

  build-webos:
    name: Build libretro (webOS)
    runs-on: ubuntu-22.04
    env:
      WEBOS_TOOLCHAIN_URL: https://github.com/openlgtv/buildroot-nc4/releases/latest/download/arm-webos-linux-gnueabi_sdk-buildroot-x86_64.tar.gz
      RUST_TARGET: armv7-unknown-linux-gnueabi
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabi

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: nightly-webos

      - name: Install webOS native toolchain
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            "$WEBOS_TOOLCHAIN_URL" \
            --output "$RUNNER_TEMP/webos-toolchain.tar.gz"
          mkdir -p "$RUNNER_TEMP/webos-toolchain"
          tar xzf "$RUNNER_TEMP/webos-toolchain.tar.gz" \
            -C "$RUNNER_TEMP/webos-toolchain" --strip-components=1
          "$RUNNER_TEMP/webos-toolchain/relocate-sdk.sh"
          echo "$RUNNER_TEMP/webos-toolchain/bin" >> "$GITHUB_PATH"
          echo "WEBOS_TOOLCHAIN=$RUNNER_TEMP/webos-toolchain" >> "$GITHUB_ENV"

      - name: Build libretro core (webOS ARMv7)
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABI_LINKER: arm-webos-linux-gnueabi-gcc
          CC_armv7_unknown_linux_gnueabi: arm-webos-linux-gnueabi-gcc
          AR_armv7_unknown_linux_gnueabi: arm-webos-linux-gnueabi-ar
        run: cargo build -p native32emu-libretro --release --target "$RUST_TARGET"

      - name: Verify and stage libretro core (webOS)
        shell: bash
        run: |
          core="target/$RUST_TARGET/release/libnative32emu.so"
          arm-webos-linux-gnueabi-readelf -h "$core"
          arm-webos-linux-gnueabi-readelf -d "$core"

          out="libretro/native32-emu-webos"
          mkdir -p "$out"
          cp "$core" "$out/native32emu_libretro.so"
          cp crates/native32emu-libretro/native32emu_libretro.info "$out/"
          ls -la "$out"

      - name: Package libretro (webOS)
        shell: bash
        run: |
          cd libretro
          tar czf ../native32-emu-webos-libretro.tar.gz native32-emu-webos
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: native32-emu-webos
          path: native32-emu-webos-libretro.tar.gz
          retention-days: 7

  release:
    name: Publish Nightly Release
    needs: [build, build-android, build-ios, build-webos]
    runs-on: ubuntu-latest
    steps:
      - name: Compute version metadata
        id: ver
        shell: bash
        run: |
          echo "DATE=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "DATETIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name '*.tar.gz' -o \
            -name '*.zip' \
          \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Recreate nightly-build release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DATE: ${{ steps.ver.outputs.DATE }}
          DATETIME: ${{ steps.ver.outputs.DATETIME }}
          SHORT_SHA: ${{ steps.ver.outputs.SHORT_SHA }}
        shell: bash
        run: |
          # Delete previous rolling release + tag
          gh release delete nightly-build --repo "$REPO" --yes --cleanup-tag 2>/dev/null || true
          gh api -X DELETE "repos/$REPO/git/refs/tags/nightly-build" 2>/dev/null || true

          notes=$(cat <<EOF
          Automated nightly build — **for testing only**.

          - Built: $DATETIME
          - Commit: [\`$SHORT_SHA\`](https://github.com/$REPO/commit/${{ github.sha }})
          - Platforms: Windows x86_64, macOS x86_64/aarch64, Linux x86_64/aarch64
          - Includes the standalone emulator and the libretro core (\`*-libretro.*\`) for RetroArch
          - Android libretro core (\`native32-emu-android-libretro.tar.gz\`) with arm64-v8a, armeabi-v7a, x86 and x86_64 ABIs
          - iOS libretro core (\`native32-emu-ios-libretro.tar.gz\`) for real devices (arm64) and simulators
          - webOS libretro core (\`native32-emu-webos-libretro.tar.gz\`) for ARMv7 TVs

          ⚠️ Unsigned build: Windows SmartScreen / macOS Gatekeeper may block on first launch.
          EOF
          )

          gh release create nightly-build \
            --repo "$REPO" \
            --target "${{ github.sha }}" \
            --title "Nightly Build $DATE ($SHORT_SHA)" \
            --notes "$notes" \
            --prerelease \
            release-assets/*
