name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: native32-emu-linux-x86_64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: native32-emu-macos-x86_64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: native32-emu-macos-aarch64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: native32-emu-windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxkbcommon-dev

      - name: Build standalone
        run: cargo build -p native32emu --release --target ${{ matrix.target }}

      - name: Build libretro core
        run: cargo build -p native32emu-libretro --release --target ${{ matrix.target }}

      - name: Stage libretro core
        shell: bash
        run: |
          out="libretro/${{ matrix.artifact }}"
          mkdir -p "$out"
          rel="target/${{ matrix.target }}/release"
          # The cdylib is already named native32emu_libretro.<ext> by Cargo.
          for f in "native32emu_libretro.dll" "libnative32emu_libretro.so" "libnative32emu_libretro.dylib"; do
            if [ -f "$rel/$f" ]; then
              cp "$rel/$f" "$out/"
              break
            fi
          done
          cp crates/native32emu-libretro/native32emu_libretro.info "$out/native32emu_libretro.info"
          ls -la "$out"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz native32-emu
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }}.zip native32-emu.exe
          cd ../../..

      - name: Package libretro (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd libretro
          tar czf ../${{ matrix.artifact }}-libretro.tar.gz ${{ matrix.artifact }}
          cd ..

      - name: Package libretro (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd libretro
          7z a ../${{ matrix.artifact }}-libretro.zip ${{ matrix.artifact }}
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.*
            ${{ matrix.artifact }}-libretro.*

  build-android:
    name: Build libretro (Android)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build libretro core (all ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo ndk \
            -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 \
            --platform 21 \
            build -p native32emu-libretro --release

      - name: Stage libretro core (Android)
        shell: bash
        run: |
          # RetroArch on Android loads cores named <corename>_libretro_android.so,
          # one per ABI directory (matching RetroArch's cores/<abi>/ layout).
          declare -A ABI_TRIPLE=(
            [arm64-v8a]=aarch64-linux-android
            [armeabi-v7a]=armv7-linux-androideabi
            [x86]=i686-linux-android
            [x86_64]=x86_64-linux-android
          )
          for abi in "${!ABI_TRIPLE[@]}"; do
            triple="${ABI_TRIPLE[$abi]}"
            out="libretro/native32-emu-android/$abi"
            mkdir -p "$out"
            cp "target/$triple/release/libnative32emu_libretro.so" \
               "$out/native32emu_libretro_android.so"
          done
          cp crates/native32emu-libretro/native32emu_libretro.info \
             libretro/native32-emu-android/native32emu_libretro.info
          ls -laR libretro/native32-emu-android

      - name: Package libretro (Android)
        shell: bash
        run: |
          cd libretro
          tar czf ../native32-emu-android-libretro.tar.gz native32-emu-android
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: native32-emu-android
          path: native32-emu-android-libretro.tar.gz

  release:
    name: Create Release
    needs: [build, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          name: "Native32 Emulator ${{ github.ref_name }}"
          body: |
            Native32 Emulator ${{ github.ref_name }}

            ## Downloads

            ### Standalone emulator
            - **Linux x86_64**: `native32-emu-linux-x86_64.tar.gz`
            - **macOS x86_64**: `native32-emu-macos-x86_64.tar.gz`
            - **macOS aarch64**: `native32-emu-macos-aarch64.tar.gz`
            - **Windows x86_64**: `native32-emu-windows-x86_64.zip`

            ### libretro core (for RetroArch)
            - Files ending in `-libretro.*` contain `native32emu_libretro.<ext>`
              plus `native32emu_libretro.info`, ready to drop into RetroArch.

            ### Android libretro core (for RetroArch on Android)
            - `native32-emu-android-libretro.tar.gz` contains
              `native32emu_libretro_android.so` for the `arm64-v8a`,
              `armeabi-v7a`, `x86` and `x86_64` ABIs.
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
