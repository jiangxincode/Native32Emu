[package]
name = "native32-emu"
version = "0.1.0"
edition = "2021"
description = "A Native32 game emulator written in Rust"

[dependencies]
clap = { version = "4", features = ["derive"] }
minifb = "0.28"
rodio = { version = "0.22", features = ["mp3"] }
anyhow = "1"
thiserror = "2"
log = "0.4"
env_logger = "0.11"
rand = "0.10"
image = "0.25"

[dev-dependencies]
cargo-husky = { version = "1", default-features = false, features = ["precommit-hook", "run-cargo-fmt", "run-cargo-clippy"] }

[profile.release]
opt-level = 3
lto = true
