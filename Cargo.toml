[package]
name = "native32-emu"
version = "0.1.0"
edition = "2021"
description = "A Native32 game emulator written in Rust"

[dependencies]
clap = { version = "4", features = ["derive"] }
minifb = "0.27"
rodio = { version = "0.19", features = ["mp3"] }
anyhow = "1"
thiserror = "2"
log = "0.4"
env_logger = "0.11"
rand = "0.8"
image = "0.25"

[profile.release]
opt-level = 3
lto = true
